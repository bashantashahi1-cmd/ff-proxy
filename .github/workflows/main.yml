name: Build Proxy
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'
      - name: Build
        run: |
          go mod tidy
          go build -o proxy proxy.go
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-binary
          path: proxy
